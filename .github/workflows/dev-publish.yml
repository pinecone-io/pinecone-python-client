name: Dev Build & Publish

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:

concurrency:
  group: dev-build-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REPO_NAME: ${{ vars.GCP_REPO_NAME }}
  PROTOC_VERSION: "28.3"

jobs:
  # ---------------------------------------------------------------------------
  # Gate: skip scheduled runs when nothing changed since last success
  # ---------------------------------------------------------------------------
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last successful run
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — always run"
            exit 0
          fi

          last_success=$(gh run list \
            --workflow "Dev Build & Publish" \
            --status success \
            --json updatedAt \
            --jq '.[0].updatedAt // empty')

          if [ -z "$last_success" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No prior successful run found — running"
            exit 0
          fi

          commit_count=$(git rev-list --count --since="$last_success" HEAD)
          if [ "$commit_count" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "$commit_count new commit(s) since $last_success"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new commits since $last_success — skipping"
          fi

  # ---------------------------------------------------------------------------
  # Stage 1: Compute dev version
  # ---------------------------------------------------------------------------
  version:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      dev_version: ${{ steps.compute.outputs.dev_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute dev version
        id: compute
        run: |
          base_version=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          timestamp=$(date +%s)
          dev_version="${base_version}.dev${timestamp}"
          echo "dev_version=${dev_version}" >> "$GITHUB_OUTPUT"
          echo "Version: ${dev_version}"

  # ---------------------------------------------------------------------------
  # Stage 2: Build wheels (matrix) + sdist
  # ---------------------------------------------------------------------------
  build-wheels:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          # macOS x86_64 (cross-compiled on arm64 runner)
          - os: macos-14
            target: x86_64-apple-darwin
          # macOS arm64
          - os: macos-14
            target: aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject dev version
        shell: bash
        run: |
          python3 -c "
          import re, pathlib
          p = pathlib.Path('pyproject.toml')
          text = p.read_text()
          text = re.sub(r'version\s*=\s*\"[^\"]+\"', 'version = \"${{ needs.version.outputs.dev_version }}\"', text, count=1)
          p.write_text(text)
          "
          python3 -c "
          import re, pathlib
          p = pathlib.Path('rust/Cargo.toml')
          text = p.read_text()
          text = re.sub(r'^version\s*=\s*\"[^\"]+\"', 'version = \"${{ needs.version.outputs.dev_version }}\"', text, count=1, flags=re.MULTILINE)
          p.write_text(text)
          "
          cargo generate-lockfile --manifest-path rust/Cargo.toml
          grep '^version' pyproject.toml rust/Cargo.toml

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --interpreter 3.10 3.11 3.12 3.13 --out dist
          manylinux: ${{ matrix.manylinux || 'auto' }}
          before-script-linux: |
            curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip
            unzip protoc-28.3-linux-x86_64.zip -d /usr/local
            rm protoc-28.3-linux-x86_64.zip

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject dev version
        run: |
          python3 -c "
          import re, pathlib
          p = pathlib.Path('pyproject.toml')
          text = p.read_text()
          text = re.sub(r'version\s*=\s*\"[^\"]+\"', 'version = \"${{ needs.version.outputs.dev_version }}\"', text, count=1)
          p.write_text(text)
          "
          python3 -c "
          import re, pathlib
          p = pathlib.Path('rust/Cargo.toml')
          text = p.read_text()
          text = re.sub(r'^version\s*=\s*\"[^\"]+\"', 'version = \"${{ needs.version.outputs.dev_version }}\"', text, count=1, flags=re.MULTILINE)
          p.write_text(text)
          "
          cargo generate-lockfile --manifest-path rust/Cargo.toml
          grep '^version' pyproject.toml rust/Cargo.toml

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Stage 3: Publish to Artifact Registry
  # ---------------------------------------------------------------------------
  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: pip install twine

      - name: Configure Artifact Registry credentials
        run: |
          pip install keyring keyrings.google-artifactregistry-auth

      - name: Upload to Artifact Registry
        run: |
          twine upload \
            --repository-url "https://${GCP_REGION}-python.pkg.dev/${GCP_PROJECT_ID}/${GCP_REPO_NAME}/" \
            dist/*
